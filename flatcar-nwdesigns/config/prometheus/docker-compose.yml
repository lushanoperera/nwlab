version: '3.8'

# Prometheus — TSDB backend for blog-publisher observability.
#
# Receives metrics via remote_write from the otel-collector container in the
# adjacent /opt/otel-collector/ stack on this same host (flatcar-nwdesigns,
# VM 104). Both join the shared `observability` Docker network so the collector
# can resolve `http://prometheus:9090/api/v1/write`.
#
# Internal-only: bound to 127.0.0.1:9090 on the host for ad-hoc local
# debugging via SSH tunnel. No traefik route — only Grafana and the collector
# need to talk to it.

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    hostname: prometheus
    restart: unless-stopped
    mem_limit: 768m
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.enable-remote-write-receiver"
      - "--web.enable-otlp-receiver"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      # Loopback bind: SSH-tunnel from a workstation to poke the API,
      # otherwise unreachable from the LAN. Grafana + collector use the
      # docker network name `prometheus:9090` instead.
      - "127.0.0.1:9090:9090"
    networks:
      - observability
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  prometheus_data:
    driver: local

networks:
  # Shared bridge for the nwlab observability segment
  # (otel-collector + prometheus + grafana). Created here; the other two
  # stacks join it as `external: true`.
  observability:
    name: observability
    driver: bridge
