# Prometheus config for the nwlab observability backend.
#
# Remote-write ingestion is enabled via the CLI flag
# `--web.enable-remote-write-receiver` in docker-compose.yml (NOT via this file).
# The blog-publisher otel-collector co-located on this same host
# (flatcar-nwdesigns, VM 104) pushes Claude Code OTEL metrics to
# http://prometheus:9090/api/v1/write over the shared `observability`
# Docker bridge network — no cross-host or cross-WireGuard traffic.
#
# Scrape configs below are intentionally minimal — the primary ingestion
# path is remote_write. Add scrape targets here if/when we pull metrics
# directly from future services on flatcar-104.

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: nwlab
    host: flatcar-nwdesigns

scrape_configs:
  # Self-scrape so Prometheus exposes its own internal metrics.
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # otel-collector self-telemetry — exposes otelcol_exporter_*,
  # otelcol_processor_*, otelcol_receiver_* on :8888. Resolved via the
  # shared `observability` bridge network. Alerting on these prevents
  # silent pipeline regressions (delta-temporality, queue saturation, etc.).
  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8888

  # Placeholder for future scrape jobs (node_exporter, cadvisor, etc.).
