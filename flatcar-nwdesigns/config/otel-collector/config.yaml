# OpenTelemetry Collector configuration
#
# Data source: blog-publisher cron jobs on ubuntu-desktop (VM 103, 10.21.21.103).
# Claude Code native OTEL (CLAUDE_CODE_ENABLE_TELEMETRY=1) emits metrics, logs and
# traces to this collector at 10.21.21.104:4317 (gRPC) / :4318 (HTTP).
#
# Exports:
#   - file/metrics, file/traces, file/logs — rotating NDJSON under /data/*.jsonl
#     (mapped to /opt/otel-collector/data/ on the host — tail/jq for forensics)
#   - prometheusremotewrite — metrics forwarded to Prometheus co-located on
#     flatcar-104 (`http://prometheus:9090/api/v1/write`) over the shared
#     `observability` Docker bridge network. No cross-WG traffic. Retry + queue
#     keep metrics durable across restarts.
#   - debug — stdout, verbosity=basic, for container logs sanity-check.
#
# See flatcar-nwdesigns/docs/services.md for jq query examples.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024
  resource:
    attributes:
      - key: deployment.environment
        value: prod
        action: upsert
      - key: host.name
        value: ubuntu-desktop
        action: upsert
  # Claude Code emits DELTA temporality sums; Prometheus OTLP receiver
  # requires CUMULATIVE. Accumulate deltas in-memory over a 5 min window.
  deltatocumulative:
    max_stale: 5m

exporters:
  file/metrics:
    path: /data/metrics.jsonl
    rotation:
      max_megabytes: 50
      max_days: 14
      max_backups: 5
      localtime: true
  file/traces:
    path: /data/traces.jsonl
    rotation:
      max_megabytes: 50
      max_days: 14
      max_backups: 5
      localtime: true
  file/logs:
    path: /data/logs.jsonl
    rotation:
      max_megabytes: 50
      max_days: 14
      max_backups: 5
      localtime: true

  otlphttp/prometheus:
    endpoint: http://prometheus:9090/api/v1/otlp
    tls:
      insecure: true
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 60s
      max_elapsed_time: 10m

  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  telemetry:
    # Collector's own internal metrics (queue depth, send failures, refused
    # points) exposed as a Prometheus endpoint on :8888. Scraped by the
    # co-located Prometheus over the `observability` bridge — see
    # ../prometheus/prometheus.yml. Lets us alert on
    # otelcol_exporter_send_failed_metric_points / sending_queue saturation
    # instead of rediscovering delta-temporality or pipeline bugs by eye.
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch, resource, deltatocumulative]
      exporters: [file/metrics, otlphttp/prometheus, debug]
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [file/traces, debug]
    logs:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [file/logs, debug]
